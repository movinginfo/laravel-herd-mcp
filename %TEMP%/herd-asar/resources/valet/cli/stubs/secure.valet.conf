server {
    listen 127.0.0.1:80;
    #listen VALET_LOOPBACK:80; # valet loopback
    server_name VALET_SITE www.VALET_SITE *.VALET_SITE;
    return 301 https://$host$request_uri;
}

server {
    listen 127.0.0.1:443 ssl;
    #listen VALET_LOOPBACK:443 ssl; # valet loopback
    server_name VALET_SITE www.VALET_SITE *.VALET_SITE;
    root /;
    charset utf-8;
    client_max_body_size 512M;
    http2 on;

    location ~* /41c270e4-5535-4daa-b23e-c269744c2f45/([A-Z]+:)(.*) {
        internal;
        alias $1;
        try_files $2 $2/;
    }

    ssl_certificate "VALET_CERT";
    ssl_certificate_key "VALET_KEY";

    location / {
        rewrite ^ "HERD_VALET_PATH" last;
    }

    access_log off;
    error_log "HERD_HOME_PATH/Log/nginx-error.log";

    error_page 404 "HERD_VALET_PATH";

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Herd specific configuration, do not change
        fastcgi_pass $herd_sock;

        fastcgi_index "HERD_VALET_PATH";
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME "HERD_VALET_PATH";
        fastcgi_param HERD_HOME "HERD_HOME_PATH";
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.ht {
        deny all;
    }
}

server {
    listen 127.0.0.1:60;
    #listen VALET_LOOPBACK:60; # valet loopback
    server_name VALET_SITE www.VALET_SITE *.VALET_SITE;
    root /;
    charset utf-8;
    client_max_body_size 128M;

    add_header X-Robots-Tag 'noindex, nofollow, nosnippet, noarchive';

    location ~* /41c270e4-5535-4daa-b23e-c269744c2f45/([A-Z]+:)(.*) {
        internal;
        alias /;
        try_files $uri $uri/;
    }

    location / {
        rewrite ^ "HERD_VALET_PATH" last;
    }

    access_log off;
    error_log "HERD_HOME_PATH/Log/nginx-error.log";

    error_page 404 "HERD_VALET_PATH";

    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass $herd_sock;
        fastcgi_index "HERD_VALET_PATH";
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME "HERD_VALET_PATH";
        fastcgi_param HERD_HOME "HERD_HOME_PATH";
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.ht {
        deny all;
    }
}
